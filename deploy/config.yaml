# PicoClaw deployment configuration — Pi Zero 2 W
# Paths are absolute on the Pi filesystem.

# Expected IANA timezone name. If set, the agent logs a warning at startup when
# time.Local does not match. Leave empty to disable the check.
expected_timezone: "Europe/Rome"

tools:
  wiki:
    dir: /home/picoclaw/wiki
    enabled: true
  bash:
    enabled: true
  web:
    enabled: false
  skills:
    enabled: true
  gmail:
    enabled: true
    accounts:
      - name: darra2
        refresh_token_env: GMAIL_REFRESH_TOKEN_DARRA2
      - name: chiunque
        refresh_token_env: GMAIL_REFRESH_TOKEN_CHIUNQUE
  outlook:
    enabled: true
  gcal:
    enabled: true
    calendar_id: primary
  github:
    enabled: true
    pat_env: GITHUB_PAT
    # Repositories the assistant may read from and file inquiry issues against.
    # Must be set before /gh or /claude will work. Format: ["owner/repo", ...]
    watched_repos: []
  link_fetch:
    enabled: true
  scheduler:
    enabled: true
    briefing_time: "08:00"
    reminder_tick_seconds: 60
    heartbeat_path: "state/heartbeat"
    # primary_chat_id / alert_chat_id: leave empty initially; set to the
    # Telegram chat ID of the primary user once known.
    primary_chat_id: ""
    alert_chat_id: ""
    parse_model: ""   # leave empty to disable LLM time-parsing fallback
